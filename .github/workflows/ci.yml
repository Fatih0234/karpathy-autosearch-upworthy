name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Smoke benchmark (heuristic, no API)
        run: |
          # Create minimal synthetic data for smoke benchmark
          python -c "
          import pandas as pd, pathlib, os
          data = {
            'test_id': ['t1','t1','t2'],
            'pair_id': ['t1_1','t1_2','t2_1'],
            'headline_a': ['7 shocking reasons','Secret truth revealed','Amazing discovery'],
            'headline_b': ['A headline','Something happened','News update'],
            'excerpt_a': ['','',''],
            'excerpt_b': ['','',''],
            'ctr_a': [0.05,0.04,0.06],
            'ctr_b': [0.02,0.01,0.03],
            'label': [1,1,1],
            'eyecatcher_same': [True,False,True],
          }
          p = pathlib.Path('data/processed')
          p.mkdir(parents=True, exist_ok=True)
          pd.DataFrame(data).to_parquet(p/'dev.parquet', index=False)
          "
          MODEL_PROVIDER=heuristic uv run python -m upworthy_autosearch.benchmark dev
